name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Build APK
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,kivymd,requests,datetime,sqlite3,plyer,threading,matplotlib,fpdf,barcode,Pillow,pyzbar,socket,json,hashlib,uuid/' buildozer.spec
        sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE/' buildozer.spec
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: facturos-apk
        path: bin/*.apk

